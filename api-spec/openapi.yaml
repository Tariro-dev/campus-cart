openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: orders
    description: Order management operations
  - name: vendors
    description: Vendor operations
  - name: recommendations
    description: AI-powered recommendation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor with stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorWithStats"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommendations:
    post:
      operationId: getRecommendations
      tags: [recommendations]
      summary: Get AI-powered product recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
      responses:
        "200":
          description: List of recommended products with reasoning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [vendors]
      summary: Get vendor dashboard statistics
      parameters:
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        stock:
          type: integer
        vendorId:
          type: integer
        vendorName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - price
        - category
        - stock
        - vendorId
        - vendorName
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        stock:
          type: integer
        vendorId:
          type: integer
      required:
        - name
        - description
        - price
        - category
        - stock
        - vendorId

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        stock:
          type: integer

    Vendor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        logoUrl:
          type: string
        rating:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - category
        - rating
        - createdAt

    VendorWithStats:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        logoUrl:
          type: string
        rating:
          type: number
        createdAt:
          type: string
          format: date-time
        totalProducts:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - id
        - name
        - description
        - category
        - rating
        - createdAt
        - totalProducts
        - totalOrders
        - totalRevenue
        - products

    CreateVendorBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        logoUrl:
          type: string
      required:
        - name
        - description
        - category

    UpdateVendorBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        logoUrl:
          type: string
        rating:
          type: number

    Order:
      type: object
      properties:
        id:
          type: integer
        buyerName:
          type: string
        buyerEmail:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        vendorId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - buyerName
        - buyerEmail
        - status
        - totalAmount
        - vendorId
        - createdAt
        - updatedAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
      required:
        - id
        - orderId
        - productId
        - productName
        - quantity
        - unitPrice

    OrderWithItems:
      type: object
      properties:
        id:
          type: integer
        buyerName:
          type: string
        buyerEmail:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        vendorId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
      required:
        - id
        - buyerName
        - buyerEmail
        - status
        - totalAmount
        - vendorId
        - createdAt
        - updatedAt
        - items

    CreateOrderBody:
      type: object
      properties:
        buyerName:
          type: string
        buyerEmail:
          type: string
        vendorId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
      required:
        - buyerName
        - buyerEmail
        - vendorId
        - items

    OrderItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RecommendationRequest:
      type: object
      properties:
        userId:
          type: string
        category:
          type: string
        recentProductIds:
          type: array
          items:
            type: integer
        budget:
          type: number
      required:
        - userId

    RecommendationResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        reasoning:
          type: string
      required:
        - products
        - reasoning

    DashboardStats:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalProducts:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - totalRevenue
        - totalOrders
        - pendingOrders
        - totalProducts
        - recentOrders
        - topProducts

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
